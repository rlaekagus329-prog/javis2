version: '3.8'

services:
  pgvector-db:
    # 벡터 검색을 위한 pgvector 전용 이미지
    image: ankane/pgvector:latest
    container_name: javis2-db
    restart: always
    environment:
      POSTGRES_USER: postgres      # 화면의 '사용자' 설정과 일치
      POSTGRES_PASSWORD: 1234  # ⚠️ 화면에 <숨김> 처리된 실제 비밀번호를 꼭 입력해 주세요!
      POSTGRES_DB: javis2          # 화면의 '데이터베이스' 설정과 일치
    ports:
      # 외부(인텔리제이, Flask)에서는 3300으로 접속하고, 도커 내부에서는 5432로 연결합니다.
      - "3300:5432"
    volumes:
      # D드라이브 프로젝트 폴더 내부에 데이터를 안전하게 저장합니다.
      - ./pg_data:/var/lib/postgresql/data